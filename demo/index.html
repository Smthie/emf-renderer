<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>emf-renderer</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #1f2937;
      }

      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.06);
        overflow: hidden;
      }

      .header {
        padding: 24px;
        border-bottom: 1px solid #e5e7eb;
      }

      .header h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .header p {
        margin: 0;
        color: #6b7280;
        line-height: 1.6;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid #e5e7eb;
      }

      .file-label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-weight: 600;
      }

      .file-label:hover {
        background: #1d4ed8;
      }

      #fileInput {
        display: none;
      }

      .file-name {
        color: #374151;
        font-size: 14px;
        word-break: break-all;
      }

      .status {
        padding: 16px 24px 0;
        min-height: 44px;
        font-size: 14px;
      }

      .status--hint {
        color: #6b7280;
      }

      .status--loading {
        color: #1d4ed8;
      }

      .status--error {
        color: #dc2626;
      }

      .preview-wrap {
        padding: 24px;
      }

      .preview {
        min-height: 420px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        border: 1px dashed #cbd5e1;
        border-radius: 12px;
        background-image:
          linear-gradient(45deg, #f8fafc 25%, transparent 25%),
          linear-gradient(-45deg, #f8fafc 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #f8fafc 75%),
          linear-gradient(-45deg, transparent 75%, #f8fafc 75%);
        background-size: 20px 20px;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0;
        overflow: auto;
      }

      .empty {
        color: #94a3b8;
        text-align: center;
        line-height: 1.7;
      }

      .preview canvas,
      .preview img,
      .preview svg {
        max-width: 100%;
        height: auto;
        display: block;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="header">
          <h1>emf-renderer</h1>
          <p>选择本地 EMF 文件，浏览器会直接调用纯前端渲染器并导出 PNG Data URL 结果。</p>
        </div>

        <div class="toolbar">
          <label class="file-label" for="fileInput">选择 EMF 文件</label>
          <input id="fileInput" type="file" accept=".emf,application/octet-stream" />
          <div id="fileName" class="file-name">未选择文件</div>
        </div>

        <div id="status" class="status status--hint">请选择 EMF 文件进行预览。</div>

        <div class="preview-wrap">
          <div id="preview" class="preview">
            <div class="empty">导入后将在这里显示渲染结果</div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
